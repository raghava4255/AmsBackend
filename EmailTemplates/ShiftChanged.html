<p style="font-size: 1.1rem; margin-top: 0;">Hello <strong>{{EmployeeName}}</strong>,</p>
<p>Your shift change request has been <strong style="color: {{StatusColor}};">{{Status}}</strong> by <strong>{{ApproverName}}</strong>.</p>

<table style="width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.95rem;">
  <tr style="border-bottom: 1px solid #eee;">
    <td style="padding: 8px 0; color: #666; width: 35%;">Requested Shift:</td>
    <td style="padding: 8px 0; font-weight: bold;">{{ShiftName}}</td>
  </tr>
  <tr style="border-bottom: 1px solid #eee;">
    <td style="padding: 8px 0; color: #666;">Shift Timing:</td>
    <td style="padding: 8px 0; font-weight: bold;">{{ShiftTiming}}</td>
  </tr>
  <tr style="border-bottom: 1px solid #eee;">
    <td style="padding: 8px 0; color: #666;">Decision:</td>
    <td style="padding: 8px 0; font-weight: bold; color: {{StatusColor}};">{{Status}}</td>
  </tr>
  <tr style="border-bottom: 1px solid #eee;">
    <td style="padding: 8px 0; color: #666;">Remarks:</td>
    <td style="padding: 8px 0;">{{Remarks}}</td>
  </tr>
</table>

<p>If you have any questions, please contact your manager or HR department.</p>
<p style="color: #666; font-size: 0.9rem;">Decided on: {{DecisionDate}}</p>
